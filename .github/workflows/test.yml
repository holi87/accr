name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sjsi_test
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx prisma generate --schema=packages/backend/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=packages/backend/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sjsi_test
      - run: npx prisma db seed --schema=packages/backend/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sjsi_test
      - run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/sjsi_test
          SESSION_SECRET: test-secret
          NODE_ENV: test
          APP_URL: http://localhost:3000
