services:
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    volumes: [uploads:/app/uploads]
    depends_on:
      postgres: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sjsi
      POSTGRES_PASSWORD: sjsi_secret
      POSTGRES_DB: sjsi_accreditation
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5434:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sjsi"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  uploads:
